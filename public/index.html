<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hillarys QC Inspector</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:system-ui,sans-serif;background:#FAF3E8;color:#111827;font-size:13px;}
header{background:#1E2235;padding:12px 20px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;}
.logo{font-size:15px;font-weight:700;color:#fff;letter-spacing:.5px;}
.logo-sub{font-size:9px;color:rgba(255,255,255,.4);letter-spacing:3px;}
.pill{background:rgba(255,255,255,.12);color:rgba(255,255,255,.75);padding:2px 9px;border-radius:4px;font-size:11px;font-weight:600;}
.pill-red{background:#C8314A;color:#fff;padding:2px 9px;border-radius:4px;font-size:11px;font-weight:700;}
.main{max-width:1000px;margin:0 auto;padding:20px 20px 60px;}
.order-bar{display:grid;grid-template-columns:1fr 1fr;gap:12px;background:#fff;border:1px solid #E5E7EB;border-radius:8px;padding:16px;margin-bottom:16px;}
.fld label{display:block;font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:#9CA3AF;margin-bottom:5px;}
.fld input{width:100%;border:1px solid #E5E7EB;border-radius:6px;padding:8px 11px;font-size:13px;font-family:system-ui;color:#111827;outline:none;}
.fld input:focus{border-color:#1E2235;}
.pdf-zone{border:2px dashed #E5DBCA;border-radius:8px;background:#fff;padding:28px 20px;text-align:center;cursor:pointer;position:relative;transition:all .15s;margin-bottom:14px;}
.pdf-zone:hover,.pdf-zone.drag{border-color:#1E2235;background:#f0f1ff;}
.pdf-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.pdf-zone h3{font-size:15px;font-weight:700;margin-bottom:4px;}
.pdf-zone p{font-size:12px;color:#9CA3AF;}
.pdf-zone p b{color:#1E2235;}
.spinner-wrap{display:none;position:absolute;inset:0;background:rgba(250,243,232,.95);border-radius:8px;flex-direction:column;align-items:center;justify-content:center;gap:10px;z-index:5;}
.spinner-wrap.show{display:flex;}
.spinner{width:30px;height:30px;border:3px solid #E5DBCA;border-top-color:#1E2235;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.sp-txt{font-size:13px;font-weight:700;color:#1E2235;}
.sp-sub{font-size:11px;color:#9CA3AF;}
.job-tag{display:none;align-items:center;gap:6px;background:#D1FAE5;color:#059669;border:1px solid rgba(5,150,105,.2);padding:5px 14px;border-radius:100px;font-size:11px;font-weight:600;margin-bottom:12px;}
.job-tag.show{display:inline-flex;}
.err-tag{display:none;background:#FDEAED;color:#C8314A;border:1px solid rgba(200,49,74,.2);padding:10px 14px;border-radius:8px;font-size:12px;font-weight:600;margin-bottom:12px;}
.err-tag.show{display:block;}
.warn-tag{display:none;background:#FEF3C7;color:#92400E;border:1px solid rgba(217,119,6,.2);padding:10px 14px;border-radius:8px;font-size:12px;font-weight:600;margin-bottom:12px;}
.warn-tag.show{display:block;}
.chips{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.chip{padding:3px 11px;border-radius:100px;font-size:11px;font-weight:600;border:1px solid transparent;}
.c-tot{background:#F2EBD9;color:#4B5563;border-color:#E5DBCA;}
.c-ok{background:#D1FAE5;color:#059669;}
.c-pend{background:#FEF3C7;color:#D97706;}
.c-rej{background:#FDEAED;color:#C8314A;}
.sec-hdr{background:#1E2235;color:#fff;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:6px 12px;border-radius:8px 8px 0 0;margin-top:14px;}
.tbl{width:100%;border-collapse:collapse;background:#fff;border:1px solid #E5E7EB;border-top:none;margin-bottom:4px;}
.tbl th{background:#F2EBD9;color:#4B5563;font-weight:700;font-size:10px;letter-spacing:.5px;text-transform:uppercase;padding:8px 12px;text-align:left;border-bottom:1px solid #E5DBCA;}
.tbl td{padding:9px 12px;border-bottom:1px solid #E5E7EB;vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr.hi td{background:#f0fff8;}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:100px;font-size:10px;font-weight:700;white-space:nowrap;}
.b-c{background:#DBEAFE;color:#2563EB;}.b-b{background:#FEF3C7;color:#D97706;}
.b-none{background:#F2EBD9;color:#9CA3AF;}.b-ok{background:#D1FAE5;color:#059669;}
.b-part{background:#FEF9C3;color:#854D0E;}.b-pend{background:#FEF3C7;color:#D97706;}
.b-rej{background:#FDEAED;color:#C8314A;}
.exp-btn{background:#1E2235;color:#fff;border:none;cursor:pointer;font-size:12px;padding:5px 12px;border-radius:6px;font-weight:600;}
.exp-btn.closed{background:#fff;color:#4B5563;border:1px solid #E5E7EB;}
.qr{display:none;}.qr.open{display:table-row;}
.qi{padding:16px;background:#F2EBD9;border-bottom:1px solid #E5DBCA;}
.qi-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px;}
.qi-info{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.qi-info strong{font-size:14px;font-weight:700;}
.qi-info span{font-size:11px;color:#4B5563;}
.up-big{border:2px dashed #C8314A;border-radius:12px;background:rgba(200,49,74,.04);padding:28px 20px;text-align:center;cursor:pointer;position:relative;margin-bottom:12px;animation:pulse 2s ease-in-out infinite;}
.up-big:hover{background:rgba(200,49,74,.09);animation:none;}
@keyframes pulse{0%,100%{border-color:#C8314A;}50%{border-color:#ff8c9e;}}
.up-big input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.up-big .ic{font-size:36px;margin-bottom:8px;}
.up-big h3{font-size:15px;font-weight:700;margin-bottom:4px;}
.up-big p{font-size:12px;color:#4B5563;margin-bottom:10px;}
.up-big .cta{display:inline-block;background:#C8314A;color:#fff;border-radius:100px;padding:7px 20px;font-size:13px;font-weight:700;}
.up-mini{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border:1px dashed #E5E7EB;border-radius:6px;cursor:pointer;position:relative;font-size:12px;font-weight:600;color:#4B5563;background:#fff;}
.up-mini input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.ig{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;margin-top:4px;}
.it{position:relative;aspect-ratio:1;border-radius:8px;overflow:hidden;border:1px solid #E5E7EB;background:#E5DBCA;}
.it img{width:100%;height:100%;object-fit:cover;display:block;}
.st{position:absolute;top:0;left:0;padding:3px 8px;font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;}
.st-p{background:rgba(251,191,36,.9);color:#78350F;}
.st-ok{background:rgba(5,150,105,.92);color:#fff;}
.st-rej{background:rgba(200,49,74,.92);color:#fff;}
.ac{position:absolute;inset:0;display:flex;align-items:flex-end;justify-content:center;gap:5px;padding-bottom:10px;background:linear-gradient(to top,rgba(0,0,0,.65) 0%,transparent 55%);opacity:0;transition:opacity .15s;}
.it:hover .ac,.it:active .ac{opacity:1;}
.ia{width:34px;height:34px;border:none;border-radius:50%;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;font-weight:700;}
.ia-ok{background:#059669;color:#fff;}.ia-rej{background:#C8314A;color:#fff;}.ia-del{background:rgba(255,255,255,.9);color:#444;}
.empty-imgs{text-align:center;padding:16px;color:#9CA3AF;font-size:12px;}
.gen-bar{background:#fff;border:1px solid #E5E7EB;border-radius:10px;padding:18px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-top:20px;}
.gen-bar h3{font-size:15px;font-weight:700;margin-bottom:3px;}
.gen-bar p{font-size:11px;color:#9CA3AF;}
.btn-gen{background:#C8314A;color:#fff;border:none;border-radius:8px;padding:13px 28px;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .15s;}
.btn-gen:hover{background:#a0263d;transform:translateY(-1px);}
.btn-gen:disabled{opacity:.4;cursor:not-allowed;transform:none;}
@media(max-width:600px){.order-bar{grid-template-columns:1fr;}.gen-bar{flex-direction:column;align-items:flex-start;}.tbl th:nth-child(4),.tbl td:nth-child(4){display:none;}}
</style>
</head>
<body>

<header>
  <span class="logo">HILLARYS</span>
  <span class="logo-sub">CURTAINS | BLINDS</span>
  <span class="pill">Ops</span>
  <span class="pill-red">QC</span>
</header>

<div class="main">

  <div class="order-bar">
    <div class="fld"><label>Order / Job Number</label><input type="text" id="orderNum" placeholder="e.g. J0002648-1"></div>
    <div class="fld"><label>Inspector Name</label><input type="text" id="inspector" placeholder="e.g. Priya Sharma"></div>
  </div>

  <div class="pdf-zone" id="pdfZone"
    ondragover="event.preventDefault();this.classList.add('drag')"
    ondragleave="this.classList.remove('drag')"
    ondrop="event.preventDefault();this.classList.remove('drag');handlePdf(event.dataTransfer.files)">
    <input type="file" accept=".pdf" id="pdfIn" onchange="handlePdf(this.files)">
    <div class="spinner-wrap" id="spinner">
      <div class="spinner"></div>
      <div class="sp-txt" id="spTxt">Reading PDF...</div>
      <div class="sp-sub" id="spSub">Please wait</div>
    </div>
    <div style="font-size:32px;margin-bottom:8px" id="pdfIcon">📄</div>
    <h3 id="pdfTitle">Drop Insyte Job PDF here</h3>
    <p>or <b>click to browse</b> &mdash; all rooms auto-fill automatically</p>
  </div>

  <div id="jobTag" class="job-tag">&#10003; <span id="jobTagTxt"></span></div>
  <div id="errTag" class="err-tag"></div>
  <div id="warnTag" class="warn-tag"></div>

  <div id="chips" class="chips">
    <span class="chip c-tot">0 Total</span>
    <span class="chip c-ok">0 Approved</span>
    <span class="chip c-pend">0 Pending</span>
    <span class="chip c-rej">0 Rejected</span>
  </div>

  <div id="tableArea"></div>

  <div class="gen-bar">
    <div>
      <h3>Download QC Report PDF</h3>
      <p>Upload photos &rarr; tap &#10003; green to approve &rarr; download</p>
    </div>
    <button class="btn-gen" id="genBtn" onclick="genPDF()">&#8595; Download PDF Report</button>
  </div>
</div>

<script>
var ITEMS = [];

function handlePdf(files) {
  var file = files[0];
  if (!file || !file.name.toLowerCase().endsWith('.pdf')) { showErr('Please select a PDF file'); return; }
  hideErr(); hideWarn();
  showSpinner('Reading PDF...', 'Uploading...');
  var reader = new FileReader();
  reader.onload = function(e) {
    var b64 = e.target.result.split(',')[1];
    callParse(b64, file.name);
  };
  reader.onerror = function() { hideSpinner(); showErr('Could not read file'); };
  reader.readAsDataURL(file);
}

function callParse(b64, filename) {
  setSpinSub('AI extracting rooms...');
  fetch('/api/parse', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ pdfBase64: b64, filename: filename })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    hideSpinner();
    if (data.error) { showErr('Error: ' + data.error); return; }
    if (!data.items || !data.items.length) { showErr('No items found in PDF — is this an Insyte job sheet?'); return; }
    ITEMS = data.items.map(function(it, i) {
      return { lineNo:i+1, location:String(it.location||''), type:String(it.type||'Curtain'),
               section:String(it.section||'Curtain'), fabric:String(it.fabric||''),
               width:String(it.width||''), drop:String(it.drop||''), images:[] };
    });
    if (!document.getElementById('orderNum').value)
      document.getElementById('orderNum').value = filename.replace('.pdf','');
    document.getElementById('pdfIcon').textContent = '✅';
    document.getElementById('pdfTitle').textContent = filename + ' — loaded';
    document.getElementById('jobTag').classList.add('show');
    document.getElementById('jobTagTxt').textContent = ITEMS.length + ' items loaded from ' + filename;
    document.getElementById('pdfIn').value = '';
    render();
  })
  .catch(function(err) {
    hideSpinner();
    showErr('Network error: ' + err.message);
  });
}

function render() {
  var area = document.getElementById('tableArea');
  if (!ITEMS.length) { area.innerHTML = ''; updateChips(); return; }
  var sections = [], seen = {};
  ITEMS.forEach(function(it) { if (!seen[it.section]) { seen[it.section]=true; sections.push(it.section); } });
  var html = '';
  sections.forEach(function(secName) {
    var secItems = ITEMS.filter(function(it) { return it.section===secName; });
    var icon = secItems[0].type==='Curtain' ? '🪟' : '🔲';
    html += '<div class="sec-hdr">'+icon+' '+secName+'</div>';
    html += '<table class="tbl"><thead><tr><th style="width:90px">Upload</th><th style="width:36px">#</th><th>Location</th><th>Fabric</th><th style="width:90px">W&times;D mm</th><th style="width:55px">Imgs</th><th style="width:115px">Status</th></tr></thead><tbody>';
    secItems.forEach(function(it, idx) {
      var tot = it.images.length;
      var isOpen = idx===0 || (document.getElementById('qr_'+it.lineNo) && document.getElementById('qr_'+it.lineNo).classList.contains('open'));
      html += '<tr class="'+(tot?'hi':'')+'">' +
        '<td><button class="exp-btn '+(isOpen?'':'closed')+'" id="eb_'+it.lineNo+'" onclick="toggle('+it.lineNo+')">'+(isOpen?'&#9650; Hide':'&#128247; Upload')+'</button></td>' +
        '<td style="font-size:10px;color:#9CA3AF;font-weight:700">L'+pad(it.lineNo)+'</td>' +
        '<td style="font-weight:700">'+esc(it.location)+'</td>' +
        '<td style="font-size:11px;color:#4B5563">'+esc(it.fabric)+'</td>' +
        '<td style="font-size:11px;color:#4B5563;white-space:nowrap">'+it.width+'&times;'+it.drop+'</td>' +
        '<td style="font-size:11px">'+(tot||'&mdash;')+'</td>' +
        '<td>'+statusBadge(it)+'</td></tr>';
      html += '<tr class="qr '+(isOpen?'open':'')+'" id="qr_'+it.lineNo+'"><td colspan="7"><div class="qi">' +
        '<div class="qi-top"><div class="qi-info"><strong>'+esc(it.location)+'</strong><span class="badge b-'+(it.type==='Curtain'?'c':'b')+'">'+it.type+'</span>'+(it.fabric?'<span>'+esc(it.fabric)+'</span>':'')+(it.width?'<span>'+it.width+'&times;'+it.drop+'mm</span>':'')+'</div>' +
        (tot?'<label class="up-mini"><input type="file" accept="image/*" multiple onchange="addImgs('+it.lineNo+',this.files)">&#128247; Add More</label>':'')+'</div>' +
        (!tot?'<div class="up-big"><input type="file" accept="image/*" multiple onchange="addImgs('+it.lineNo+',this.files)"><div class="ic">&#128247;</div><h3>Tap to upload photos</h3><p>Choose photos of '+esc(it.location)+' from your device</p><div class="cta">Choose Photos &rarr;</div></div>':'') +
        imgGrid(it)+'</div></td></tr>';
    });
    html += '</tbody></table>';
  });
  area.innerHTML = html;
  updateChips();
}

function toggle(n) {
  var row=document.getElementById('qr_'+n), btn=document.getElementById('eb_'+n);
  var open=row.classList.toggle('open');
  btn.classList.toggle('closed',!open);
  btn.innerHTML=open?'&#9650; Hide':'&#128247; Upload';
}

function reopen(n) {
  var wasOpen=document.getElementById('qr_'+n)&&document.getElementById('qr_'+n).classList.contains('open');
  render();
  if(wasOpen){
    var row=document.getElementById('qr_'+n), btn=document.getElementById('eb_'+n);
    if(row) row.classList.add('open');
    if(btn){btn.classList.remove('closed');btn.innerHTML='&#9650; Hide';}
  }
}

function addImgs(n,files) {
  var it=ITEMS.find(function(x){return x.lineNo===n;});
  if(!it) return;
  var arr=Array.from(files), idx=0;
  function next() {
    if(idx>=arr.length){reopen(n);return;}
    var f=arr[idx++];
    if(!f.type.startsWith('image/')){next();return;}
    var fr=new FileReader();
    fr.onload=function(e){it.images.push({id:Date.now()+Math.random(),src:e.target.result,status:'pending'});next();};
    fr.readAsDataURL(f);
  }
  next();
}

function setSt(n,id,st) {
  var it=ITEMS.find(function(x){return x.lineNo===n;}); if(!it) return;
  var img=it.images.find(function(i){return i.id===id;}); if(!img) return;
  img.status=img.status===st?'pending':st; reopen(n);
}

function delImg(n,id) {
  var it=ITEMS.find(function(x){return x.lineNo===n;}); if(!it) return;
  it.images=it.images.filter(function(i){return i.id!==id;}); reopen(n);
}

function countAll() {
  var a=0,p=0,r=0,t=0;
  ITEMS.forEach(function(it){it.images.forEach(function(i){t++;if(i.status==='approved')a++;else if(i.status==='rejected')r++;else p++;});});
  return{a:a,p:p,r:r,t:t};
}

function updateChips() {
  var c=countAll();
  document.getElementById('chips').innerHTML=
    '<span class="chip c-tot">'+c.t+' Total</span>'+
    '<span class="chip c-ok">'+c.a+' Approved</span>'+
    '<span class="chip c-pend">'+c.p+' Pending</span>'+
    '<span class="chip c-rej">'+c.r+' Rejected</span>';
}

function statusBadge(it) {
  var ok=0,rej=0,tot=it.images.length;
  it.images.forEach(function(i){if(i.status==='approved')ok++;else if(i.status==='rejected')rej++;});
  if(!tot) return'<span class="badge b-none">No images</span>';
  if(ok===tot) return'<span class="badge b-ok">&#10003; '+ok+'/'+tot+' Pass</span>';
  if(ok>0) return'<span class="badge b-part">&#11044; '+ok+'/'+tot+' Pass</span>';
  if(rej>0) return'<span class="badge b-rej">&#10005; Rejected</span>';
  return'<span class="badge b-pend">&#9679; Pending</span>';
}

function imgGrid(it) {
  if(!it.images.length) return'<div class="empty-imgs">No images yet</div>';
  var html='<div class="ig">';
  it.images.forEach(function(img){
    var cls=img.status==='approved'?'st-ok':img.status==='rejected'?'st-rej':'st-p';
    var lbl=img.status==='approved'?'&#10003;Pass':img.status==='rejected'?'&#10005;Fail':'&#9679;Wait';
    html+='<div class="it"><img src="'+img.src+'"><div class="st '+cls+'">'+lbl+'</div><div class="ac">'+
      '<button class="ia ia-ok" onclick="setSt('+it.lineNo+','+img.id+',\'approved\')">&#10003;</button>'+
      '<button class="ia ia-rej" onclick="setSt('+it.lineNo+','+img.id+',\'rejected\')">&#10005;</button>'+
      '<button class="ia ia-del" onclick="delImg('+it.lineNo+','+img.id+')">&#128465;</button>'+
      '</div></div>';
  });
  return html+'</div>';
}

function pad(n){return String(n).length<2?'0'+n:''+n;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function showErr(m){var el=document.getElementById('errTag');el.textContent='⚠ '+m;el.classList.add('show');}
function hideErr(){document.getElementById('errTag').classList.remove('show');}
function showWarn(m){var el=document.getElementById('warnTag');el.textContent=m;el.classList.add('show');}
function hideWarn(){document.getElementById('warnTag').classList.remove('show');}
function showSpinner(t,s){document.getElementById('spinner').classList.add('show');document.getElementById('spTxt').textContent=t;document.getElementById('spSub').textContent=s;}
function setSpinSub(s){document.getElementById('spSub').textContent=s;}
function hideSpinner(){document.getElementById('spinner').classList.remove('show');}

function genPDF() {
  var order=document.getElementById('orderNum').value.trim()||'N/A';
  var insp=document.getElementById('inspector').value.trim()||'Inspector';
  var c=countAll(); hideWarn();
  if(c.a===0){showWarn('⚠ No approved images yet — upload photos and tap the ✓ green button first');return;}
  var btn=document.getElementById('genBtn');
  btn.disabled=true; btn.textContent='Generating...';
  try {
    var jsPDF=window.jspdf.jsPDF;
    var doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    var W=210,H=297,M=14,CW=W-M*2;
    var NAVY=[30,34,53],RED=[200,49,74],CREAM=[250,243,232],SAND=[242,235,217];
    var WW=[255,255,255],TXT=[17,24,39],LGR=[156,163,175],GRN=[5,150,105];

    function hdr(title,sub) {
      doc.setFillColor(NAVY[0],NAVY[1],NAVY[2]);doc.rect(0,0,W,34,'F');
      doc.setFillColor(RED[0],RED[1],RED[2]);doc.rect(0,0,5,34,'F');
      doc.setTextColor(WW[0],WW[1],WW[2]);doc.setFont('helvetica','bold');doc.setFontSize(17);doc.text('HILLARYS',M+3,15);
      doc.setTextColor(190,205,220);doc.setFont('helvetica','normal');doc.setFontSize(7);doc.text('CURTAINS | BLINDS',M+4,22);
      doc.setFillColor(RED[0],RED[1],RED[2]);doc.rect(M+63,8,10,7,'F');
      doc.setTextColor(WW[0],WW[1],WW[2]);doc.setFontSize(6.5);doc.text('QC',M+64.5,13.5);
      doc.setTextColor(WW[0],WW[1],WW[2]);doc.setFont('helvetica','bold');doc.setFontSize(11);doc.text(title,M+3,30);
      if(sub){doc.setTextColor(180,195,210);doc.setFont('helvetica','normal');doc.setFontSize(7);doc.text(sub,W-M,30,{align:'right'});}
    }

    doc.setFillColor(CREAM[0],CREAM[1],CREAM[2]);doc.rect(0,0,W,H,'F');
    hdr('QUALITY CONTROL INSPECTION REPORT','Order: '+order);
    doc.setFillColor(WW[0],WW[1],WW[2]);doc.rect(M,42,CW,24,'F');
    doc.setDrawColor(229,231,235);doc.setLineWidth(.3);doc.rect(M,42,CW,24,'S');
    doc.setFillColor(RED[0],RED[1],RED[2]);doc.rect(M,42,3,24,'F');
    var dateStr=new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
    [[M+7,'ORDER',order],[M+72,'INSPECTOR',insp],[M+148,'DATE',dateStr]].forEach(function(r){
      doc.setTextColor(LGR[0],LGR[1],LGR[2]);doc.setFont('helvetica','bold');doc.setFontSize(6.5);doc.text(r[1],r[0],51);
      doc.setTextColor(TXT[0],TXT[1],TXT[2]);doc.setFont('helvetica','bold');doc.setFontSize(11);doc.text(String(r[2]),r[0],61);
    });

    var lastSec=null,cy=80;
    var appr=ITEMS.filter(function(it){return it.images.some(function(i){return i.status==='approved';});});
    doc.setTextColor(NAVY[0],NAVY[1],NAVY[2]);doc.setFont('helvetica','bold');doc.setFontSize(8);
    doc.text('APPROVED ITEMS SUMMARY',M,cy);
    doc.setDrawColor(229,231,235);doc.setLineWidth(.3);doc.line(M,cy+2,W-M,cy+2);cy+=8;

    appr.forEach(function(it){
      if(it.section!==lastSec){
        if(cy>H-18){doc.addPage();doc.setFillColor(CREAM[0],CREAM[1],CREAM[2]);doc.rect(0,0,W,H,'F');cy=18;}
        doc.setFillColor(NAVY[0],NAVY[1],NAVY[2]);doc.rect(M,cy-2,CW,7,'F');
        doc.setTextColor(WW[0],WW[1],WW[2]);doc.setFont('helvetica','bold');doc.setFontSize(7);
        doc.text(it.section.toUpperCase(),M+3,cy+3);cy+=9;lastSec=it.section;
      }
      if(cy>H-14){doc.addPage();doc.setFillColor(CREAM[0],CREAM[1],CREAM[2]);doc.rect(0,0,W,H,'F');cy=18;}
      var ac=it.images.filter(function(i){return i.status==='approved';}).length;
      doc.setFillColor(SAND[0],SAND[1],SAND[2]);doc.rect(M,cy-2.5,CW,7,'F');
      doc.setTextColor(TXT[0],TXT[1],TXT[2]);doc.setFont('helvetica','bold');doc.setFontSize(8.5);
      doc.text('L'+pad(it.lineNo)+'  '+it.location,M+3,cy+2);
      doc.setTextColor(LGR[0],LGR[1],LGR[2]);doc.setFont('helvetica','normal');doc.setFontSize(7);doc.text(it.fabric,M+80,cy+2);
      doc.setFillColor(GRN[0],GRN[1],GRN[2]);doc.rect(W-M-22,cy-2,22,7,'F');
      doc.setTextColor(WW[0],WW[1],WW[2]);doc.setFont('helvetica','bold');doc.setFontSize(6.5);
      doc.text(ac+' img'+(ac>1?'s':''),W-M-11,cy+2.5,{align:'center'});cy+=9;
    });
    doc.setTextColor(LGR[0],LGR[1],LGR[2]);doc.setFont('helvetica','normal');doc.setFontSize(6.5);
    doc.text('hillarys.co.in  Bangalore, India  Confidential',W/2,H-8,{align:'center'});

    ITEMS.forEach(function(it){
      var apprImgs=it.images.filter(function(i){return i.status==='approved';});
      if(!apprImgs.length) return;
      doc.addPage();doc.setFillColor(CREAM[0],CREAM[1],CREAM[2]);doc.rect(0,0,W,H,'F');
      hdr(it.location,'Order: '+order);
      doc.setFillColor(WW[0],WW[1],WW[2]);doc.rect(M,36,CW,9,'F');
      doc.setDrawColor(229,231,235);doc.setLineWidth(.25);doc.rect(M,36,CW,9,'S');
      doc.setTextColor(LGR[0],LGR[1],LGR[2]);doc.setFont('helvetica','normal');doc.setFontSize(7);
      doc.text('L'+pad(it.lineNo)+' - '+it.section+' - '+it.fabric+' - '+it.width+'x'+it.drop+'mm',M+3,42);
      doc.setFillColor(GRN[0],GRN[1],GRN[2]);doc.rect(W-M-28,36,28,9,'F');
      doc.setTextColor(WW[0],WW[1],WW[2]);doc.setFont('helvetica','bold');doc.setFontSize(6.5);
      doc.text(apprImgs.length+' approved',W-M-14,41.5,{align:'center'});
      var iw=(CW-7)/2,ih=iw*0.67,ix=M,iy=48,col=0;
      apprImgs.forEach(function(img){
        if(iy+ih+10>H-10){doc.addPage();doc.setFillColor(CREAM[0],CREAM[1],CREAM[2]);doc.rect(0,0,W,H,'F');hdr(it.location+' (cont.)','Order: '+order);iy=38;ix=M;col=0;}
        doc.setFillColor(WW[0],WW[1],WW[2]);doc.setDrawColor(229,231,235);doc.setLineWidth(.25);doc.rect(ix,iy,iw,ih+9,'FD');
        try{var fmt=img.src.indexOf('/png')>-1?'PNG':img.src.indexOf('/webp')>-1?'WEBP':'JPEG';doc.addImage(img.src,fmt,ix,iy,iw,ih,undefined,'MEDIUM');}
        catch(e){doc.setFillColor(SAND[0],SAND[1],SAND[2]);doc.rect(ix,iy,iw,ih,'F');}
        doc.setFillColor(WW[0],WW[1],WW[2]);doc.rect(ix,iy+ih,iw,9,'F');
        doc.setFillColor(GRN[0],GRN[1],GRN[2]);doc.rect(ix,iy+ih,18,9,'F');
        doc.setTextColor(WW[0],WW[1],WW[2]);doc.setFont('helvetica','bold');doc.setFontSize(6);doc.text('PASS',ix+9,iy+ih+6,{align:'center'});
        col++;if(col===2){col=0;ix=M;iy+=ih+13;}else{ix=M+iw+7;}
      });
      doc.setTextColor(LGR[0],LGR[1],LGR[2]);doc.setFont('helvetica','normal');doc.setFontSize(6.5);
      doc.text(it.location+' - '+order+' - '+insp,M,H-7);
      doc.text(new Date().toLocaleDateString('en-IN'),W-M,H-7,{align:'right'});
    });

    var fname='Hillarys_QC_'+order.replace(/[^a-z0-9]/gi,'_')+'_'+new Date().toISOString().slice(0,10)+'.pdf';
    doc.save(fname);
  } catch(err) {
    console.error('PDF ERROR:',err);
    alert('PDF Error: '+err.message);
  }
  btn.disabled=false; btn.textContent='↓ Download PDF Report';
}

render(); updateChips();
</script>
